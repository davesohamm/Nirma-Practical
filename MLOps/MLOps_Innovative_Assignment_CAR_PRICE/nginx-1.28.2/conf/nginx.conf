
# ─────────────────────────────────────────────────────────────
#   Nginx Reverse Proxy — Used Car Price Prediction API
#   Proxies:  Client (port 80) → Waitress/Flask (port 8000)
# ─────────────────────────────────────────────────────────────

worker_processes  1;

error_log  logs/error.log;
error_log  logs/error.log  notice;

pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  logs/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ── Upstream: Waitress WSGI Backend ──────────────────────
    upstream flask_backend {
        server 127.0.0.1:8000;
    }

    # ── Main Server Block ────────────────────────────────────
    server {
        listen       80;
        server_name  localhost;

        # ── Proxy all API requests to Flask/Waitress ─────────
        location / {
            proxy_pass         http://flask_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout  30s;
            proxy_send_timeout     30s;
            proxy_read_timeout     60s;

            # Buffering
            proxy_buffering        on;
            proxy_buffer_size      4k;
            proxy_buffers          8 4k;

            # CORS headers (allow Streamlit and browser clients)
            add_header Access-Control-Allow-Origin  *  always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS"  always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization"  always;

            # Handle preflight OPTIONS requests
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin  *;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
                add_header Access-Control-Allow-Headers "Content-Type, Authorization";
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
        }

        # ── Health check shortcut ────────────────────────────
        location = /health {
            proxy_pass         http://flask_backend/health;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── Error pages ─────────────────────────────────────
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
