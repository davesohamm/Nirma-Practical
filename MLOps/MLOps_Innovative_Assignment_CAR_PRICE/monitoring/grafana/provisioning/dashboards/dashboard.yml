# ─── Grafana Dashboard Provider ───────────────────────────────────────────────
# Auto-loads dashboards from JSON files on startup.

apiVersion: 1

providers:
  - name: "default"
    orgId: 1
    folder: "Car Price MLOps"
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
