# ─── Prometheus Configuration ─────────────────────────────────────────────────
# Scrapes FastAPI /metrics endpoint every 15 seconds.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "fastapi"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "car-price-api"
          environment: "production"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
